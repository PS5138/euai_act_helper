[tools]
node = "lts"

# ─── Setup ────────────────────────────────────────────────────────────────────

[tasks.install]
description = "Install all dependencies (run once after cloning)"
run = """
echo "→ Installing frontend dependencies..."
cd fe && npm install

echo "✓ Done. Copy fe/.env.example to fe/.env and add your ANTHROPIC_API_KEY."
"""

# ─── Dev ──────────────────────────────────────────────────────────────────────

[tasks.dev]
description = "Start Next.js on :3000"
dir = "fe"
run = "npm run dev"
